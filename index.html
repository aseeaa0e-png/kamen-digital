<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>خارطة نمو مشروعك — تمكين النمو</title>
<meta name="description" content="في أقل من دقيقة، اكتشف خارطة نمو مشروعك بضغطات بسيطة — تمكين النمو الرقمي.">
<meta name="theme-color" content="#1E2417">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1E2417; --olive:#33402A; --olive-2:#3E4D32;
    --brass:#CBA35A; --brass-2:#E2C988;
    --sand:#F2ECDD; --sand-dim:#C7C0AC;
    --paper:#F5F0E4; --paper-ink:#26301C; --paper-dim:#5E6A4E;
    --line:rgba(242,236,221,.14); --line-ink:rgba(38,48,28,.14);
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
    background:radial-gradient(120% 90% at 80% 0%, #3A4A2C 0%, var(--ink) 60%);
    color:var(--sand); min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:24px 18px; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%; max-width:620px}
  .brand{
    display:flex; align-items:center; gap:9px; justify-content:center;
    font-size:14px; letter-spacing:.5px; color:var(--brass-2);
    margin-bottom:26px; font-weight:600;
  }
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--brass);box-shadow:0 0 0 4px rgba(203,163,90,.18)}

  /* growth indicator */
  .growth{display:flex;align-items:flex-end;gap:6px;height:34px;margin-bottom:22px;justify-content:flex-start}
  .growth i{
    flex:1;border-radius:5px 5px 2px 2px;background:var(--line);
    transition:background .45s ease, transform .45s ease;transform-origin:bottom;
  }
  .growth i.done{background:linear-gradient(180deg,var(--brass-2),var(--brass))}
  .growth i.now{background:var(--sand)}

  .card{
    background:linear-gradient(180deg, rgba(62,77,50,.55), rgba(51,64,42,.35));
    border:1px solid var(--line); border-radius:var(--r);
    padding:30px 26px; backdrop-filter:blur(4px);
  }
  .eyebrow{font-size:12.5px;letter-spacing:1.2px;color:var(--brass-2);font-weight:600;margin-bottom:14px}
  h1{font-family:"El Messiri",serif;font-weight:700;font-size:clamp(26px,5.5vw,36px);line-height:1.3;margin-bottom:14px}
  .q{font-family:"El Messiri",serif;font-weight:600;font-size:clamp(21px,4.6vw,27px);line-height:1.45;margin-bottom:8px}
  .lead{color:var(--sand-dim);font-size:15.5px;margin-bottom:22px}
  .hint{color:var(--brass-2);font-size:14px;margin:-4px 0 20px;opacity:.9}

  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{
    font-family:inherit;font-size:16px;font-weight:500;color:var(--sand);
    text-align:right;width:100%;cursor:pointer;
    background:rgba(242,236,221,.05);border:1px solid var(--line);
    border-radius:13px;padding:15px 18px;transition:.18s;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .opt:hover,.opt:focus-visible{background:rgba(203,163,90,.14);border-color:var(--brass);outline:none;transform:translateY(-1px)}
  .opt .arw{color:var(--brass);opacity:0;transition:.18s;font-size:18px}
  .opt:hover .arw,.opt:focus-visible .arw{opacity:1}

  /* chips (sector) */
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 26px}
  .chip{
    font-family:inherit;font-size:14.5px;font-weight:500;color:var(--sand);cursor:pointer;
    background:rgba(242,236,221,.05);border:1px solid var(--line);border-radius:999px;padding:9px 16px;transition:.16s;
  }
  .chip:hover,.chip:focus-visible{border-color:var(--brass);outline:none}
  .chip.sel{background:var(--brass);color:var(--ink);border-color:var(--brass);font-weight:600}

  .field{display:flex;gap:10px;margin-top:14px}
  .field input{
    flex:1;font-family:inherit;font-size:15.5px;color:var(--sand);
    background:rgba(242,236,221,.05);border:1px solid var(--line);border-radius:12px;padding:13px 16px;
  }
  .field input::placeholder{color:var(--sand-dim)}
  .field input:focus{outline:none;border-color:var(--brass)}

  .btn{
    font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
    background:var(--brass);color:var(--ink);border:none;border-radius:13px;
    padding:15px 26px;transition:.16s;width:100%;
  }
  .btn:hover,.btn:focus-visible{background:var(--brass-2);outline:none;transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--sand-dim);font-weight:500;border:1px solid var(--line)}
  .btn.ghost:hover{color:var(--sand);background:rgba(242,236,221,.05)}

  .back{margin-top:18px;background:none;border:none;color:var(--sand-dim);font-family:inherit;font-size:14px;cursor:pointer}
  .back:hover{color:var(--sand)}

  .anim{animation:rise .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ===== RESULT — light "document" card ===== */
  .map{background:var(--paper);color:var(--paper-ink);border-radius:var(--r);padding:30px 26px;animation:rise .5s ease}
  .map .top{font-size:12.5px;letter-spacing:1px;color:#9a7b34;font-weight:700;margin-bottom:6px}
  .map h2{font-family:"El Messiri",serif;font-size:clamp(23px,5vw,30px);font-weight:700;margin-bottom:22px}
  .row{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line-ink)}
  .row:last-of-type{border-bottom:none}
  .row .ic{font-size:20px;flex-shrink:0;line-height:1.5}
  .row .bd .lbl{font-size:12.5px;color:var(--paper-dim);font-weight:600;margin-bottom:2px}
  .row .bd .val{font-size:15.5px;font-weight:500;color:var(--paper-ink);line-height:1.6}
  .success{background:linear-gradient(180deg,#EDE3C7,#E6D9B6);border-radius:13px;padding:16px 18px;margin:18px 0;border:1px solid rgba(154,123,52,.25)}
  .success .lbl{font-size:12.5px;color:#8a6d2c;font-weight:700;margin-bottom:3px}
  .success .val{font-family:"El Messiri",serif;font-size:18px;font-weight:600}
  .note{background:rgba(38,48,28,.05);border-right:3px solid var(--brass);border-radius:8px;padding:12px 15px;margin-bottom:22px;font-size:14.5px;color:#46503a}
  .note b{color:var(--paper-ink)}
  .cta-main{background:#26301C;color:var(--paper);font-weight:700;font-size:16.5px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:9px;border-radius:13px;padding:16px;transition:.16s}
  .cta-main:hover{background:#33402A;transform:translateY(-1px)}
  .cta-sub{font-size:13px;color:var(--paper-dim);text-align:center;margin-top:10px}
  .restart{background:none;border:none;color:#8a8470;font-family:inherit;font-size:14px;cursor:pointer;display:block;margin:16px auto 0;text-decoration:underline}

  .map-intro{font-size:14.5px;color:var(--paper-dim);margin-bottom:20px;line-height:1.6}
  .score{display:flex;align-items:center;gap:16px;background:linear-gradient(180deg,#ECE3CC,#E6DBBE);border:1px solid rgba(154,123,52,.22);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .score-num{font-family:"El Messiri",serif;font-weight:700;font-size:40px;line-height:1;color:#9a7b34;flex-shrink:0}
  .score-num span{font-size:16px;color:#b6a36a}
  .score-bd{flex:1;min-width:0}
  .score-lbl{font-size:13.5px;font-weight:700;color:var(--paper-ink);margin-bottom:8px}
  .score-bar{height:8px;border-radius:99px;background:rgba(38,48,28,.12);overflow:hidden;margin-bottom:8px}
  .score-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#CBA35A,#9a7b34)}
  .score-note{font-size:12.5px;color:var(--paper-dim);line-height:1.55}
  .insight{background:#2B361F;color:var(--paper);border-radius:14px;padding:18px 20px;margin-bottom:24px}
  .insight-lbl{font-size:12.5px;letter-spacing:.5px;color:var(--brass-2);font-weight:700;margin-bottom:7px}
  .insight-txt{font-family:"El Messiri",serif;font-size:17.5px;font-weight:600;line-height:1.6}
  .reassure{font-size:13px;color:var(--paper-dim);line-height:1.6;background:rgba(38,48,28,.04);border-radius:10px;padding:12px 15px;margin:22px 0 16px}
  .method{text-align:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--line-ink)}
  .method span{font-size:12.5px;color:var(--paper-dim);font-weight:600}
  .method-steps{font-size:13px;color:#9a7b34;font-weight:600;margin-top:6px;letter-spacing:.3px}

  @media (prefers-reduced-motion:reduce){.anim,.map{animation:none}}
  @media (max-width:480px){.card,.map{padding:24px 18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span> تمكين النمو · خارطة نمو مشروعك</div>
  <div id="app"></div>
</div>

<script>
const PHONE = "966553353448";

const SECTORS = [
  {id:"shop",  label:"متجر أو محل",        lost:"كم عميل دخل، قارن، وطلع ما اشترى؟"},
  {id:"realestate", label:"عقار",          lost:"كم باحث عن عقار سأل وراح لغيرك قبل أن ترد؟"},
  {id:"food",  label:"مطعم أو كافيه",       lost:"كم طلب راح لمكان أسرع رداً منك؟"},
  {id:"salon", label:"صالون أو تجميل",      lost:"كم حجز ضاع لأن ما أحد رد بسرعة؟"},
  {id:"clinic",label:"عيادة أو خدمة طبية",  lost:"كم مراجع تحوّل لجهة ردّت أسرع؟"},
  {id:"shop2", label:"ورشة أو مقاول",       lost:"كم عرض سعر طلبوه وما تابعته؟"},
  {id:"other", label:"نشاط آخر",            lost:"كم عميل مهتم ضاع قبل ما يوصلك؟"}
];

// each option carries the snippets it writes into the growth map
const Q = [
  {
    key:"goal", eyebrow:"الهدف", title:"لو التقينا بعد سنة، ما الذي يجعلك تقول: كانت سنة موفّقة لمشروعي؟",
    opts:[
      {label:"مبيعات أعلى وأرباح أوضح",      goal:"مبيعات أعلى وأرباح أوضح خلال سنة."},
      {label:"عملاء جدد بشكل مستمر",          goal:"تدفّق ثابت من العملاء الجدد، لا اعتماد على العابرين."},
      {label:"اسم وسمعة أقوى في مجالي",       goal:"أن تصبح الاسم الأول الذي يُذكر في مجالك بمدينتك."},
      {label:"التوسّع وفتح فرع جديد",          goal:"نموّ يحمل فرعاً ثانياً قريباً."},
      {label:"تنظيم العمل وتوفير وقتي",        goal:"نظام يشتغل وأنت بعيد، يوفّر وقتك ويريح بالك."}
    ]
  },
  {
    key:"pain", eyebrow:"الألم الحقيقي", title:"ما أكثر شيء يضيع عليك في مشروعك اليوم؟", useHint:true,
    opts:[
      {label:"عملاء جدد قليلون يصلونني",      block:"العملاء لا يصلونك بما يكفي — الظهور والوصول هو حلقتك الناقصة."},
      {label:"المنافسون يظهرون أكثر مني",      block:"المنافس يسبقك في نظر العميل، غالباً لأنه أوضح حضوراً لا أفضل منتجاً."},
      {label:"يزورون أو يسألون ثم لا يشترون", block:"الاهتمام موجود لكنه لا يتحوّل إلى بيع — المشكلة في التحويل لا الجذب."},
      {label:"التسويق لا يجلب نتائج",          block:"جهدك التسويقي متفرّق بلا منظومة تربط حلقاته وتقيس أثره."},
      {label:"الأعمال اليومية تستهلك وقتي",    block:"العمل اليومي يبتلع وقتك، والمتابعة تضيع بين الزحمة."}
    ]
  },
  {
    key:"priority", eyebrow:"الأولوية", title:"لو حللنا مشكلة واحدة فقط الآن، أيها تختار؟",
    opts:[
      {label:"أن يجدوني أول لما يبحثون",       quick:"ظهورك أول أمام من يبحث عن خدمتك محلياً.", step:"تحسين ملف Google والظهور المحلي خلال 30 يوماً."},
      {label:"أن أرد على الاستفسارات فوراً",    quick:"ردّ فوري آلي على مدار الساعة لا يفوّت عميلاً.", step:"تفعيل بوت واتساب يرد فوراً ويحفظ كل استفسار."},
      {label:"أن أعرض منتجاتي باحترافية",       quick:"معرض رقمي يبني الثقة قبل أن يزورك العميل.", step:"إطلاق معرضك الرقمي بمنتجاتك الفعلية."},
      {label:"أن أوصل لعملاء جدد بإعلان",       quick:"إعلان موجّه لمن يبحث عن خدمتك الآن.", step:"إطلاق أول حملة إعلانية مركّزة ومقيسة بالأرقام."},
      {label:"أن أنظّم متابعة عملائي",          quick:"نظام يتابع عملاءك ويعيد جذبهم تلقائياً.", step:"ترتيب رحلة العميل وأتمتة المتابعة."}
    ]
  },
  {
    key:"success", eyebrow:"تعريف النجاح", title:"متى ستشعر أن المشروع نجح فعلاً؟",
    opts:[
      {label:"مبيعات أعلى بوضوح",              next:"بعد أول نتيجة: مضاعفة ما يبيع أكثر وتوسيع القنوات المربحة."},
      {label:"عملاء أكثر باستمرار",            next:"بعد أول نتيجة: بناء تدفّق عملاء متجدّد لا يتوقف."},
      {label:"سمعة قوية واسم معروف",           next:"بعد أول نتيجة: ترسيخ علامتك حتى تُذكر أولاً في مجالك."},
      {label:"أرباح أعلى وراحة بال",           next:"بعد أول نتيجة: أتمتة أوسع تعطيك دخلاً أوضح ووقتاً أهدأ."},
      {label:"توسّع وفروع جديدة",              next:"بعد أول نتيجة: تجهيز المنظومة لتحمل التوسّع والفرع القادم."}
    ]
  },
  {
    key:"positioning", eyebrow:"التموضع", title:"برأيك، ما الذي يفعله منافسك بشكل أفضل منك اليوم؟",
    opts:[
      {label:"يعرض أسعاراً أوضح",   note:"ينافس بالسعر؟ الحل إظهار قيمتك حتى يصبح السعر ثانوياً، لا التخفيض."},
      {label:"معروف أكثر مني",      note:"معروف أكثر لا أفضل — الحضور الرقمي يقلب هذه المعادلة لصالحك."},
      {label:"أسرع في الردّ والخدمة", note:"السرعة تكسب العميل — الردّ الفوري الآلي يعيدها لك."},
      {label:"حضوره الرقمي أوضح",   note:"حضوره الرقمي أوضح فقط — وهذا بالضبط ما نبنيه لك."},
      {label:"بصراحة… لا أعرف",     note:"لا تعرف ما يميّز منافسك — وهذه أهم إجابة: مشروعك يحتاج تموضعاً واضحاً، ونبدأ منه."}
    ]
  },
  {
    key:"golden", eyebrow:"النتيجة الفاصلة", title:"ما النتيجة التي لو تحققت، تقول عندها: نجحنا؟",
    lead:"هذه النتيجة نقيس عليها نجاحنا معك من البداية.",
    free:true,
    opts:[
      {label:"عملاء واستفسارات جدد كل أسبوع",  result:"عملاء واستفسارات جدد كل أسبوع."},
      {label:"مبيعات أعلى بوضوح",              result:"مبيعات أعلى بوضوح."},
      {label:"أظهر أول لما يبحثون عني",        result:"الظهور أول لمن يبحث عنك."},
      {label:"وقت أقل في الشغل اليدوي",        result:"وقت أقل في الشغل اليدوي وراحة أكثر."}
    ]
  }
];

let state = {sector:null, step:-1, ans:{}};
let restartCount = 0;
const app = document.getElementById("app");
const enc = encodeURIComponent;

function growthBars(active){
  let h=""; for(let i=0;i<6;i++){
    const cls = i<active ? "done" : (i===active ? "now":"");
    const ht = 38 + i*10; // rising
    h += `<i class="${cls}" style="height:${ht}%"></i>`;
  }
  return `<div class="growth">${h}</div>`;
}

function intro(){
  app.innerHTML = `
  <div class="card anim">
    <div class="eyebrow">بعد ما شفت النموذج · 6 ضغطات</div>
    <h1>خلّنا نرسم خارطة نمو مشروعك</h1>
    <p class="lead">خلال دقيقة نحدّد معاً أكبر فرصة لتحسين مشروعك ونرسم أول خطوة عملية — وقد نخبرك أيضاً إذا كنت لا تحتاج بعض خدماتنا الآن.</p>
    <div class="eyebrow" style="margin-bottom:8px">نوع نشاطك</div>
    <div class="chips" id="chips">
      ${SECTORS.map((s,i)=>`<button class="chip" data-i="${i}">${s.label}</button>`).join("")}
    </div>
    <button class="btn" id="start" disabled style="opacity:.5">اختر نشاطك للبدء</button>
  </div>`;
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));
    c.classList.add("sel");
    state.sector = SECTORS[+c.dataset.i];
    const b=document.getElementById("start");
    b.disabled=false; b.style.opacity=1; b.textContent="ابدأ ←";
  });
  document.getElementById("start").onclick=()=>{ if(state.sector){state.step=0; render();} };
}

function question(){
  const q = Q[state.step];
  const hint = q.useHint ? `<p class="hint">${state.sector.lost}</p>` : "";
  const lead = q.lead ? `<p class="lead">${q.lead}</p>` : "";
  const free = q.free ? `
    <div class="field">
      <input id="freetxt" type="text" placeholder="أو اكتبها بكلماتك…" maxlength="80">
      <button class="btn" id="freego" style="width:auto;padding:13px 20px">تم</button>
    </div>` : "";
  app.innerHTML = `
  <div class="anim">
    ${growthBars(state.step)}
    <div class="card">
      <div class="eyebrow">${q.eyebrow} · سؤال ${state.step+1} من 6</div>
      <p class="q">${q.title}</p>
      ${lead}
      ${hint}
      <div class="opts">
        ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span>${o.label}</span><span class="arw">←</span></button>`).join("")}
      </div>
      ${free}
      ${state.step>0?`<button class="back" id="back">← رجوع</button>`:""}
    </div>
  </div>`;
  document.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    state.ans[q.key] = q.opts[+b.dataset.i];
    next();
  });
  if(q.free){
    const go=()=>{
      const v=document.getElementById("freetxt").value.trim();
      if(v){ state.ans[q.key]={label:v,result:v}; next(); }
    };
    document.getElementById("freego").onclick=go;
    document.getElementById("freetxt").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  }
  const bk=document.getElementById("back");
  if(bk) bk.onclick=()=>{ state.step--; render(); };
}

function next(){
  if(state.step < Q.length-1){ state.step++; render(); }
  else result();
}

// readiness score — deterministic from answers, bounded to a reassuring band
function readiness(a){
  const goalPts={"مبيعات أعلى وأرباح أوضح":5,"عملاء جدد بشكل مستمر":5,"اسم وسمعة أقوى في مجالي":6,"التوسّع وفتح فرع جديد":7,"تنظيم العمل وتوفير وقتي":8};
  const painPts={"عملاء جدد قليلون يصلونني":3,"المنافسون يظهرون أكثر مني":5,"يزورون أو يسألون ثم لا يشترون":9,"التسويق لا يجلب نتائج":6,"الأعمال اليومية تستهلك وقتي":10};
  let s = 30 + (goalPts[a.goal.label]??5) + (painPts[a.pain.label]??5) + 5;
  s += a.positioning.label.indexOf("لا أعرف")>-1 ? -2 : 3;
  return Math.max(38, Math.min(62, s));
}

// "إذا فهمناك بشكل صحيح" — synthesized reframe keyed to the core pain
const INSIGHT={
  "عملاء جدد قليلون يصلونني":"مشروعك لا تنقصه الجودة بل الظهور — العملاء لا يصلونك لأنك غير ظاهر لحظة بحثهم، والحل منظومة وصول لا مجرد إعلان.",
  "المنافسون يظهرون أكثر مني":"المنافس لا يتفوّق عليك بمنتجه، بل بوضوح حضوره الرقمي — وهذه فجوة تُغلق بخطة واضحة لا بخفض السعر.",
  "يزورون أو يسألون ثم لا يشترون":"مشكلتك ليست في جذب الاهتمام بل في تحويله — لديك مهتمون، لكن تنقصك منظومة تحوّلهم إلى عملاء فعليين.",
  "التسويق لا يجلب نتائج":"تسويقك موجود لكنه متفرّق بلا منظومة تربط حلقاته وتقيس أثره — والنمو يبدأ بترتيبه لا بزيادته.",
  "الأعمال اليومية تستهلك وقتي":"مشروعك يعمل، لكن غياب الأتمتة يجعل الزحمة اليومية تبتلع وقتك وتُضيّع فرص البيع بين يديك."
};

function result(){
  const a = state.ans;
  const score = readiness(a);
  const insight = INSIGHT[a.pain.label] || "مشروعك يحتاج إلى ترتيب أولوياته الرقمية أولاً، قبل أي إنفاق متفرّق.";
  const waLines = [
    "مرحباً 👋 سويت خارطة نمو مشروعي عبر أداتكم:",
    `• نشاطي: ${state.sector.label}`,
    `• هدفي: ${a.goal.label}`,
    `• أكثر شي يحبطني: ${a.pain.label}`,
    `• أبغى أحل أولاً: ${a.priority.label}`,
    `• النجاح عندي: ${a.golden.label}`,
    "",
    "أبغى أبدأ أسبوع الإطلاق بـ499 ريال 🌿"
  ].join("\n");
  const wa = `https://wa.me/${PHONE}?text=${enc(waLines)}`;

  app.innerHTML = `
  <div class="map">
    <div class="top">خارطة النمو · ${state.sector.label}</div>
    <h2>خارطة نمو مشروعك</h2>
    <p class="map-intro">بناءً على إجاباتك، هذه هي الأولويات التي نوصي بالتركيز عليها أولاً لتحقيق أكبر أثر.</p>

    <div class="score">
      <div class="score-num">${score}<span>/100</span></div>
      <div class="score-bd">
        <div class="score-lbl">مؤشر جاهزية مشروعك للنمو</div>
        <div class="score-bar"><i style="width:${score}%"></i></div>
        <div class="score-note">هذا الرقم طبيعي في بداية الرحلة الرقمية لأي مشروع — والهدف أن نتجاوز 70 خلال الأشهر القادمة.</div>
      </div>
    </div>

    <div class="insight">
      <div class="insight-lbl">إذا فهمناك بشكل صحيح…</div>
      <div class="insight-txt">${insight}</div>
    </div>

    <div class="row"><span class="ic">🎯</span><div class="bd"><div class="lbl">هدفك</div><div class="val">${a.goal.goal}</div></div></div>
    <div class="row"><span class="ic">🚧</span><div class="bd"><div class="lbl">العائق الرئيسي اليوم</div><div class="val">${a.pain.block}</div></div></div>
    <div class="row"><span class="ic">⭐</span><div class="bd"><div class="lbl">أسرع فرصة تحقق نتيجة</div><div class="val">${a.priority.quick}</div></div></div>
    <div class="row"><span class="ic">📅</span><div class="bd"><div class="lbl">أول خطوة خلال 30 يوماً</div><div class="val">${a.priority.step}</div></div></div>
    <div class="row"><span class="ic">📈</span><div class="bd"><div class="lbl">المرحلة التالية</div><div class="val">${a.success.next}</div></div></div>

    <div class="success"><div class="lbl">✅ مقياس النجاح الذي اتفقنا عليه</div><div class="val">${a.golden.result}</div></div>
    <div class="note"><b>ملاحظة:</b> ${a.positioning.note}</div>

    <p class="reassure">هذه ليست الخطة النهائية، بل أول خطوة نوصي بها بناءً على وضع مشروعك الحالي — وبعد أول نتيجة نراجع البيانات ونبني المرحلة التالية.</p>

    <a class="cta-main" href="${wa}" target="_blank" rel="noopener">📲 ابدأ أسبوع الإطلاق — أول تقدم ملموس خلال أيام · 499 ريال</a>
    <div class="cta-sub">أسبوع إطلاق سريع ثم شهر بناء · تصلنا خارطتك تلقائياً · القرار بيدك</div>

    <div class="method">
      <span>أُعدّت هذه الخارطة وفق منهجية تمكين للنمو</span>
      <div class="method-steps">افهم · حدّد الأولوية · ابنِ · أطلق · قِس · طوّر</div>
    </div>

    ${restartCount < 3 ? '<button class="restart" id="restart">إعادة من جديد</button>' : ''}
  </div>`;
  const rs=document.getElementById("restart");
  if(rs) rs.onclick=()=>{ restartCount++; state={sector:null,step:-1,ans:{}}; render(); };
}

function render(){
  if(state.step<0) intro();
  else question();
}
render();
</script>
</body>
</html>
